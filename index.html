function renderStats() {
  if (state.view !== "stats") return;
  if (!state.currentUser?.isAdmin) { document.getElementById("dashMain").innerHTML = '<div class="empty-state">Accès admin requis</div>'; return; }

  const total = state.contacts.length;
  const traite = state.contacts.filter(c => c.statut === "traite").length;
  const conv = total ? Math.round((traite / total) * 100) : 0;

  // Leads par collab
  const perStaff = state.staff.map(s => {
    const arr = state.contacts.filter(c => c.assignedTo === s.id);
    const done = arr.filter(c => c.statut === "traite").length;
    return { ...s, total: arr.length, done, pct: arr.length ? Math.round((done/arr.length)*100) : 0 };
  }).sort((a, b) => b.total - a.total);

  // Activité (logs récents)
  const recentLogs = state.logs.slice(0, 12);

  const maxLeads = Math.max(...perStaff.map(s => s.total), 1);

  document.getElementById("dashMain").innerHTML = `
    <div class="dash-header"><div><div class="dash-title">Statistiques globales</div><div class="dash-subtitle">Vue d'ensemble des performances</div></div></div>

    <div class="stats-grid">
      <div class="stat-card" style="--accent:#9a1f96;--accent-bg:rgba(154,31,150,.12)"><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="stat-value">${total}</div><div class="stat-label">Total contacts</div></div>
      <div class="stat-card" style="--accent:#16a34a;--accent-bg:rgba(22,163,74,.12)"><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div><div class="stat-value">${conv}%</div><div class="stat-label">Taux de conversion</div></div>
      <div class="stat-card" style="--accent:#2563eb;--accent-bg:rgba(37,99,235,.12)"><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="stat-value">${state.staff.length}</div><div class="stat-label">Collaborateurs</div></div>
      <div class="stat-card" style="--accent:#ea580c;--accent-bg:rgba(234,88,12,.12)"><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="stat-value">${state.logs.length}</div><div class="stat-label">Activités enregistrées</div></div>
    </div>

    <div class="panel-card">
      <h3>📊 Leads par collaborateur</h3>
      <div class="bar-chart">
        ${perStaff.map(s => `
          <div class="bar-row">
            <div class="bar-label">${s.nom}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(s.total/maxLeads)*100}%"></div></div>
            <div class="bar-value">${s.total}</div>
          </div>
        `).join("")}
      </div>
    </div>

    <div class="panel-card">
      <h3>✅ Taux de conversion par collaborateur</h3>
      <div class="bar-chart">
        ${perStaff.map(s => `
          <div class="bar-row">
            <div class="bar-label">${s.nom}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${s.pct}%"></div></div>
            <div class="bar-value">${s.pct}%</div>
          </div>
        `).join("")}
      </div>
    </div>

    <div class="panel-card">
      <h3>🕒 Activité récente</h3>
      <div class="logs-list">
        ${recentLogs.length ? recentLogs.map(l => `
          <div class="log-item">
            <div class="log-icon" style="background:linear-gradient(135deg,var(--p),var(--p-light))"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg></div>
            <div class="log-action"><b>${l.user}</b> — ${l.action}${l.details ? " · " + l.details : ""}</div>
            <div class="log-time">${timeAgo(l.at)}</div>
          </div>
        `).join("") : '<div class="empty-state">Aucune activité</div>'}
      </div>
    </div>
  `;
}

function timeAgo(ts) {
  const diff = (Date.now() - ts) / 1000;
  if (diff < 60) return "à l'instant";
  if (diff < 3600) return Math.floor(diff/60) + " min";
  if (diff < 86400) return Math.floor(diff/3600) + " h";
  return Math.floor(diff/86400) + " j";
}

function renderTabImport(c) {
  c.innerHTML = `
    <div class="panel-card">
      <h3>Import CSV / Excel</h3>
      <p style="font-size:12px;color:var(--text-soft);margin-bottom:14px;">Format attendu : colonnes Nom, Email, Téléphone, Ville, Statut. Première ligne = en-têtes.</p>
      <input type="file" id="importFile" accept=".csv,.txt" style="text-align:left;text-transform:none;letter-spacing:0;"/>
      <div id="importPreview" style="margin-top:14px;"></div>
    </div>
  `;
  document.getElementById("importFile").addEventListener("change", handleImportFile);
}
function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const text = ev.target.result;
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { toast("Fichier vide ou invalide", "error"); return; }
    const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase().trim());
    const rows = lines.slice(1).map(l => parseCSVLine(l));
    const findCol = names => headers.findIndex(h => names.some(n => h.includes(n)));
    const idxNom    = findCol(["nom","name","entreprise","société"]);
    const idxEmail  = findCol(["email","mail"]);
    const idxTel    = findCol(["tel","phone","téléphone","telephone"]);
    const idxVille  = findCol(["ville","city"]);
    const idxStatut = findCol(["statut","status"]);
    document.getElementById("importPreview").innerHTML = `
      <div class="panel-card">
        <p style="font-size:12px;color:var(--text-soft);">${rows.length} lignes détectées</p>
        <div class="modal-form">
          <label>Groupe de destination (optionnel)</label>
          <select id="imp_group" style="text-align:left;text-transform:none;letter-spacing:0;">
            <option value="">— Aucun groupe —</option>
            ${state.groups.map(g => `<option value="${g.id}">${g.name}</option>`).join("")}
            <option value="__new__">+ Créer un nouveau groupe</option>
          </select>
          <input id="imp_new_group_name" placeholder="Nom du nouveau groupe" style="display:none;text-align:left;text-transform:none;letter-spacing:0;"/>
        </div>
        <button class="btn" id="confirmImport" style="margin-top:12px;">Importer ${rows.length} contact${rows.length > 1 ? "s" : ""}</button>
      </div>
    `;
    const impGroupSel = document.getElementById("imp_group");
    const impNewInput = document.getElementById("imp_new_group_name");
    impGroupSel.addEventListener("change", () => {
      impNewInput.style.display = impGroupSel.value === "__new__" ? "block" : "none";
    });
    document.getElementById("confirmImport").addEventListener("click", async () => {
      const btn = document.getElementById("confirmImport");
      setLoading(btn, true);

      // Gérer le groupe
      let groupId = impGroupSel.value;
      if (groupId === "__new__") {
        const name = impNewInput.value.trim();
        if (!name) { toast("Donne un nom au groupe", "error"); setLoading(btn, false); return; }
        groupId = "g" + Date.now();
        try {
          await saveDoc("groups", groupId, { name, createdAt: Date.now() });
          state.groups.push({ id: groupId, name, createdAt: Date.now() });
        } catch {}
      }

      let count = 0;
      for (const r of rows) {
        const data = {
          nom: idxNom >= 0 ? r[idxNom] : "",
          email: idxEmail >= 0 ? r[idxEmail] : "",
          tel: idxTel >= 0 ? r[idxTel] : "",
          ville: idxVille >= 0 ? r[idxVille] : "",
          statut: "nouveau",
          tags: [], history: [], custom: {},
          groupId: groupId || null,
          assignedTo: state.settings.autoAssign ? autoAssignNext() : "",
          createdAt: Date.now(),
        };
        if (!data.nom) continue;
        const id = "c" + Date.now() + count;
        try { await saveDoc("contacts", id, data); count++; } catch {}
      }
      await logActivity("Import contacts", count + " lignes" + (groupId ? ` → groupe` : ""));
      toast(`${count} contacts importés`, "success");
      setLoading(btn, false);
      if (!FIREBASE_READY) renderAdminTab();
      updateGroupSelector();
    });
  };
  reader.readAsText(file);
}
function parseCSVLine(line, sep = ",") {
  const result = [];
  let cur = "", inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (inQuotes && line[i+1] === '"') { cur += '"'; i++; } else inQuotes = !inQuotes; }
    else if (ch === sep && !inQuotes) { result.push(cur); cur = ""; }
    else cur += ch;
  }
  result.push(cur);
  return result.map(v => v.trim().replace(/^"|"$/g, ""));
}

      <p style="font-size:13px;color:var(--text-soft);margin-bottom:14px;">Redistribue TOUS les leads (y compris déjà attribués) équitablement entre tous les collaborateurs. À utiliser si un collaborateur part ou pour rééquilibrer.</p>
      <button class="btn btn-ghost" id="doRebalance">Redistribuer tous les leads</button>
    </div>
  `;

  c.querySelectorAll(".quick-qty").forEach(b => b.addEventListener("click", () => {
    document.getElementById("assignQty").value = b.dataset.qty;
  }));

  document.getElementById("doAssign").addEventListener("click", async () => {
    const btn = document.getElementById("doAssign");
    const qty = parseInt(document.getElementById("assignQty").value);
    const target = document.getElementById("assignTarget").value;
    if (!qty || qty <= 0) { toast("Indique un nombre valide", "error"); return; }
    if (!state.staff.length) { toast("Aucun collaborateur", "error"); return; }
    const pool = state.contacts.filter(x => !x.assignedTo).slice(0, qty);
    if (!pool.length) { toast("Aucun lead disponible", "error"); return; }

    setLoading(btn, true);
    let done = 0;
    for (let i = 0; i < pool.length; i++) {
      const lead = pool[i];
      const assignedTo = target === "all" ? state.staff[i % state.staff.length].id : target;
      try {
        await saveDoc("contacts", lead.id, { ...lead, assignedTo });
        done++;
      } catch (e) { console.error(e); }
    }
    await logActivity("Attribution en masse", `${done} leads → ${target === "all" ? "équipe" : state.staff.find(s=>s.id===target)?.nom}`);
    toast(`${done} leads attribués`, "success");
    setLoading(btn, false);
    if (!FIREBASE_READY) renderAdminTab();
  });

  document.getElementById("doRebalance").addEventListener("click", () => {
    openModal(`<h2>Redistribuer tous les leads ?</h2><p style="font-size:13px;color:var(--text-soft);">Les ${state.contacts.length} leads seront redistribués équitablement entre les ${state.staff.length} collaborateurs. Les attributions actuelles seront écrasées.</p><div class="modal-actions"><button class="btn btn-ghost" id="cancelRb">Annuler</button><button class="btn btn-danger" id="confRb">Redistribuer</button></div>`);
    document.getElementById("cancelRb").addEventListener("click", closeModal);
    document.getElementById("confRb").addEventListener("click", async () => {
      const btn = document.getElementById("confRb");
      setLoading(btn, true);
      let done = 0;
      for (let i = 0; i < state.contacts.length; i++) {
        const lead = state.contacts[i];
        const assignedTo = state.staff[i % state.staff.length].id;
        try { await saveDoc("contacts", lead.id, { ...lead, assignedTo }); done++; } catch {}
      }
      await logActivity("Redistribution globale", `${done} leads`);
      toast(`${done} leads redistribués`, "success");
      setLoading(btn, false);
      closeModal();
      if (!FIREBASE_READY) renderAdminTab();
    });
  });
}

}

// Modale d'import CSV pour un groupe (existant ou nouveau)
function openGroupImportModal(existingGroupId) {
  const g = existingGroupId ? state.groups.find(x => x.id === existingGroupId) : null;
  openModal(`
    <h2>${g ? `Importer dans "${g.name}"` : "Importer une nouvelle liste"}</h2>
    <div class="modal-form">
      ${!g ? `<label>Nom du groupe</label><input id="gi_name" placeholder="Ex: Campagne Lyon Mai 2026" autofocus/>` : ""}
      <label>Fichier CSV</label>
      <input type="file" id="gi_file" accept=".csv,.txt" style="text-align:left;text-transform:none;letter-spacing:0;"/>
      <p style="font-size:11px;color:var(--text-soft);margin-top:4px;">Colonnes reconnues : Nom, Email, Téléphone, Ville, Statut</p>
      <div id="gi_preview"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="gi_cancel">Annuler</button>
      <button class="btn" id="gi_confirm" disabled>Importer</button>
    </div>
  `, "modal-lg");

  let parsedRows = null;
  let indices = {};

  document.getElementById("gi_cancel").addEventListener("click", closeModal);

  document.getElementById("gi_file").addEventListener("change", ev => {
    const file = ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const text = e.target.result;
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { toast("Fichier vide", "error"); return; }

      // Détecter le séparateur (virgule, point-virgule ou tab)
      const firstLine = lines[0];
      const sepCounts = { ",": (firstLine.match(/,/g) || []).length, ";": (firstLine.match(/;/g) || []).length, "\t": (firstLine.match(/\t/g) || []).length };
      const sep = Object.entries(sepCounts).sort((a, b) => b[1] - a[1])[0][0];

      const headers = parseCSVLine(lines[0], sep).map(h => h.toLowerCase().trim());
      parsedRows = lines.slice(1).map(l => parseCSVLine(l, sep));
      const findCol = names => headers.findIndex(h => names.some(n => h.includes(n)));
      indices = {
        nom:   findCol(["nom","name","entreprise","société","societe","company","raison"]),
        email: findCol(["email","mail","e-mail","courriel"]),
        tel:   findCol(["tel","phone","téléphone","telephone","mobile","portable"]),
        ville: findCol(["ville","city","commune","localité"]),
      };

      // Fallback : si aucune colonne "nom" détectée, prendre la 1ère colonne
      if (indices.nom < 0 && headers.length > 0) indices.nom = 0;

      const detected = [];
      if (indices.nom >= 0)   detected.push(`<strong>Nom</strong> → ${headers[indices.nom]}`);
      if (indices.email >= 0) detected.push(`<strong>Email</strong> → ${headers[indices.email]}`);
      if (indices.tel >= 0)   detected.push(`<strong>Tél</strong> → ${headers[indices.tel]}`);
      if (indices.ville >= 0) detected.push(`<strong>Ville</strong> → ${headers[indices.ville]}`);

      // Compter les lignes valides (avec au moins un nom)
      const validCount = parsedRows.filter(r => r[indices.nom] && r[indices.nom].trim()).length;

      document.getElementById("gi_preview").innerHTML = `
        <div style="padding:12px 14px;background:var(--glass-strong);border-radius:12px;margin-top:10px;font-size:12px;color:var(--text);">
          <div>✓ <strong>${parsedRows.length}</strong> lignes détectées · <strong style="color:${validCount === parsedRows.length ? 'var(--green)' : 'var(--orange)'};">${validCount} valides</strong></div>
          <div style="margin-top:6px;color:var(--text-soft);font-size:11px;">Séparateur : <code>${sep === "\t" ? "TAB" : sep}</code></div>
          <div style="margin-top:6px;color:var(--text-soft);font-size:11px;">Colonnes : ${detected.join(" · ") || "aucune reconnue"}</div>
        </div>
      `;
      document.getElementById("gi_confirm").disabled = validCount === 0;
    };
    reader.readAsText(file);
  });

  document.getElementById("gi_confirm").addEventListener("click", async () => {
    const btn = document.getElementById("gi_confirm");
    if (!parsedRows) { toast("Choisis un fichier CSV", "error"); return; }

    setLoading(btn, true);

    // Créer le groupe si nouveau
    let groupId = existingGroupId;
    let groupName = g?.name;
    if (!groupId) {
      groupName = document.getElementById("gi_name").value.trim();
      if (!groupName) { toast("Donne un nom au groupe", "error"); setLoading(btn, false); return; }
      groupId = "g" + Date.now();
      try {
        await saveDoc("groups", groupId, { name: groupName, createdAt: Date.now() });
        if (!state.groups.find(x => x.id === groupId)) state.groups.push({ id: groupId, name: groupName, createdAt: Date.now() });
      } catch { toast("Erreur création groupe", "error"); setLoading(btn, false); return; }
    }

    // Importer les leads
    let count = 0;
    let skipped = 0;
    for (let i = 0; i < parsedRows.length; i++) {
      const r = parsedRows[i];
      const data = {
        nom:   (indices.nom   >= 0 && r[indices.nom])   ? String(r[indices.nom]).trim()   : "",
        email: (indices.email >= 0 && r[indices.email]) ? String(r[indices.email]).trim() : "",
        tel:   (indices.tel   >= 0 && r[indices.tel])   ? String(r[indices.tel]).trim()   : "",
        ville: (indices.ville >= 0 && r[indices.ville]) ? String(r[indices.ville]).trim() : "",
        statut: "nouveau",
        tags: [], history: [], custom: {},
        groupId,
        assignedTo: state.settings.autoAssign ? autoAssignNext() : "",
        createdAt: Date.now(),
      };
      if (!data.nom) { skipped++; continue; }
      const id = "c" + Date.now() + "_" + i;
      try { await saveDoc("contacts", id, data); count++; }
      catch (err) { console.error("Import error:", err); skipped++; }
    }
    console.log(`Import: ${count} importés, ${skipped} ignorés sur ${parsedRows.length}`);
    await logActivity("Import groupe", `${count} leads → ${groupName}`);
    if (count > 0) await addNotification({ title: "Nouvelle liste importée", msg: `${count} leads ajoutés au groupe "${groupName}"`, type: "success" });
    if (count === 0) toast(`Aucun lead importé (${skipped} ignorés)`, "error");
    else toast(`${count} leads importés dans "${groupName}"${skipped ? ` (${skipped} ignorés)` : ""}`, "success");
    setLoading(btn, false);
    closeModal();
    renderAdminTab();
    updateGroupSelector();
  });
}

          <option value="status">Supprimer par statut</option>
        </select>
        <div id="cleanup_extra"></div>
      </div>
      <button class="btn btn-danger" id="doCleanup" style="margin-top:18px;">Continuer</button>
    </div>
  `;

  const modeSelect = document.getElementById("cleanup_mode");
  const extraDiv = document.getElementById("cleanup_extra");
  modeSelect.addEventListener("change", updateExtra);
  function updateExtra() {
    if (modeSelect.value === "status") {
      extraDiv.innerHTML = `<label>Statut à supprimer</label><select id="cleanup_status">${state.settings.statuses.map(s => `<option value="${s.key}">${s.label}</option>`).join("")}</select>`;
    } else {
      extraDiv.innerHTML = "";
    }
  }

  document.getElementById("doCleanup").addEventListener("click", () => {
    const staffId = document.getElementById("cleanup_staff").value;
    const mode = modeSelect.value;
    if (!staffId) { toast("Choisis un collaborateur", "error"); return; }
    const staff = state.staff.find(s => s.id === staffId);
    let pool = state.contacts.filter(c => c.assignedTo === staffId);
    if (mode === "status") {
      const st = document.getElementById("cleanup_status").value;
      pool = pool.filter(c => c.statut === st);
    }
    if (!pool.length) { toast("Aucun lead à supprimer", "error"); return; }

    if (mode === "select") {
      // Afficher la liste avec checkboxes
      openModal(`
        <h2>Sélectionner les leads à supprimer</h2>
        <p style="font-size:12px;color:var(--text-soft);">${pool.length} leads attribués à ${staff.nom}</p>
        <div style="max-height:400px;overflow-y:auto;margin:14px 0;">
          ${pool.map(ct => `
            <label style="display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid var(--divider);cursor:pointer;font-size:12px;color:var(--text);">
              <input type="checkbox" class="lead-check" data-cid="${ct.id}" style="width:18px;height:18px;"/>
              <div style="flex:1;"><strong>${ct.nom}</strong> · <span style="color:var(--text-soft);">${ct.email || ct.tel || ""}</span></div>
            </label>
          `).join("")}
        </div>
        <div style="display:flex;gap:10px;margin-bottom:12px;">
          <button class="btn btn-sm btn-ghost" id="selAll" style="flex:1;">Tout sélectionner</button>
          <button class="btn btn-sm btn-ghost" id="selNone" style="flex:1;">Tout désélectionner</button>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="cancelSel">Annuler</button>
          <button class="btn btn-danger" id="delSel">Supprimer sélection</button>
        </div>
      `, "modal-lg");
      document.getElementById("selAll").addEventListener("click", () => document.querySelectorAll(".lead-check").forEach(cb => cb.checked = true));
      document.getElementById("selNone").addEventListener("click", () => document.querySelectorAll(".lead-check").forEach(cb => cb.checked = false));
      document.getElementById("cancelSel").addEventListener("click", closeModal);
      document.getElementById("delSel").addEventListener("click", async () => {
        const btn = document.getElementById("delSel");
        const ids = Array.from(document.querySelectorAll(".lead-check:checked")).map(cb => cb.dataset.cid);
        if (!ids.length) { toast("Rien de sélectionné", "error"); return; }
        setLoading(btn, true);
        let done = 0;
        for (const id of ids) {
          try { await deleteDocById("contacts", id); done++; } catch {}
        }
        await logActivity("Suppression leads", `${done} leads de ${staff.nom}`);
        toast(`${done} leads supprimés`, "success");
        closeModal();
        renderAdminTab();
      });
    } else {
      // Confirm massive delete
      openModal(`
        <h2>Supprimer ${pool.length} leads ?</h2>
        <p style="font-size:13px;color:var(--text-soft);">Tu t'apprêtes à supprimer <b>${pool.length}</b> leads attribués à <b>${staff.nom}</b>${mode === "status" ? ` avec le statut sélectionné` : ""}. Cette action est irréversible.</p>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="cancelMd">Annuler</button>
          <button class="btn btn-danger" id="confMd">Supprimer ${pool.length} leads</button>
        </div>
      `);
      document.getElementById("cancelMd").addEventListener("click", closeModal);
      document.getElementById("confMd").addEventListener("click", async () => {
        const btn = document.getElementById("confMd");
        setLoading(btn, true);
        let done = 0;
        for (const ct of pool) {
          try { await deleteDocById("contacts", ct.id); done++; } catch {}
        }
        await logActivity("Suppression massive leads", `${done} leads de ${staff.nom}`);
        toast(`${done} leads supprimés`, "success");
        closeModal();
        renderAdminTab();
      });
    }
  });
}

// ============================================================
// INIT
// ============================================================
async function init() {
  setupTheme();
  setupParticles();
  await loadData();
  renderOrbit();
  applySettings();
  updateGroupSelector();
  refreshNotifBell();
  if (!FIREBASE_READY) toast("Mode local — config Firebase à compléter", "info");
}
init();

</script>
</body>
</html>
