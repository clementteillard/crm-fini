<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Groupe OBS — CRM</title>
<style>
  :root {
    --p: #6b1668;
    --p-light: #9a1f96;
    --p-glow: #c026d3;
    --p-soft: rgba(107, 22, 104, 0.08);
    --green: #16a34a;
    --orange: #ea580c;
    --red: #dc2626;
    --blue: #2563eb;
    --yellow: #ca8a04;
  }

  [data-theme="light"] {
    --bg-grad-1: #f7eef9;
    --bg-grad-2: #f5f0f7;
    --bg-grad-3: #ede4f0;
    --text: #2a2030;
    --text-soft: #6b5570;
    --label: #6b1668;
    --glass: rgba(255, 255, 255, 0.55);
    --glass-strong: rgba(255, 255, 255, 0.75);
    --glass-border: rgba(255, 255, 255, 0.7);
    --glass-shadow: 0 20px 50px rgba(107, 22, 104, 0.12), 0 8px 20px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.9);
    --input-bg: rgba(255, 255, 255, 0.7);
    --input-border: rgba(107, 22, 104, 0.12);
    --blob-1: rgba(154, 31, 150, 0.18);
    --blob-2: rgba(107, 22, 104, 0.15);
    --blob-3: rgba(192, 38, 211, 0.12);
    --label-shadow: 0 1px 2px rgba(255,255,255,0.8);
    --particle: rgba(107, 22, 104, 0.4);
    --divider: rgba(107, 22, 104, 0.1);
  }

  [data-theme="dark"] {
    --bg-grad-1: #1a0f1f;
    --bg-grad-2: #0f0814;
    --bg-grad-3: #050208;
    --text: #f0e8f2;
    --text-soft: #b8a8c0;
    --label: #e0b8de;
    --glass: rgba(40, 20, 45, 0.55);
    --glass-strong: rgba(40, 20, 45, 0.75);
    --glass-border: rgba(154, 31, 150, 0.35);
    --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 8px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
    --input-bg: rgba(20, 10, 25, 0.6);
    --input-border: rgba(154, 31, 150, 0.25);
    --blob-1: rgba(154, 31, 150, 0.35);
    --blob-2: rgba(192, 38, 211, 0.3);
    --blob-3: rgba(107, 22, 104, 0.25);
    --label-shadow: 0 1px 2px rgba(0,0,0,0.6);
    --particle: rgba(224, 184, 222, 0.6);
    --divider: rgba(224, 184, 222, 0.12);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); overflow: hidden; background: radial-gradient(circle at 20% 20%, var(--bg-grad-1) 0%, var(--bg-grad-2) 40%, var(--bg-grad-3) 100%); transition: background 0.6s ease, color 0.6s ease; }

  .blob { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; transition: background 0.6s ease; }
  .blob-1 { width: 500px; height: 500px; background: var(--blob-1); top: -150px; right: -100px; animation: float1 20s ease-in-out infinite; }
  .blob-2 { width: 400px; height: 400px; background: var(--blob-2); bottom: -100px; left: -100px; animation: float2 25s ease-in-out infinite; }
  .blob-3 { width: 350px; height: 350px; background: var(--blob-3); top: 40%; left: 50%; animation: float3 30s ease-in-out infinite; }
  @keyframes float1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-60px,80px) scale(1.15)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(80px,-60px) scale(1.1)} }
  @keyframes float3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-30%,-70%) scale(1.2)} }
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  .brand { position: absolute; top: 32px; left: 92px; z-index: 10; display: flex; align-items: center; gap: 14px; padding: 12px 22px 12px 14px; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1.5px solid var(--glass-border); border-radius: 22px; box-shadow: var(--glass-shadow); animation: slideDown 1.2s cubic-bezier(.4,1.4,.5,1) both; transition: all 0.6s ease; }
  .brand svg { width: 46px; height: 46px; animation: logoSpin 1.6s cubic-bezier(.4,1.4,.5,1) both, logoPulse 4s ease-in-out 1.6s infinite; filter: drop-shadow(0 4px 12px rgba(192, 38, 211, 0.5)); }
  .brand svg g { fill: var(--label); transition: fill 0.6s ease; }
  .brand-text { font-size: 19px; letter-spacing: 1.2px; color: var(--label); font-weight: 400; overflow: hidden; white-space: nowrap; animation: textReveal 1s ease 0.4s both; transition: color 0.6s ease; }
  .brand-text b { font-weight: 800; background: linear-gradient(135deg, var(--p), var(--p-glow)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  @keyframes slideDown { 0%{opacity:0;transform:translateY(-30px) scale(.8)} 100%{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes logoSpin { 0%{transform:rotate(-540deg) scale(0);opacity:0} 100%{transform:rotate(0deg) scale(1);opacity:1} }
  @keyframes logoPulse { 0%,100%{filter:drop-shadow(0 4px 12px rgba(192,38,211,.5))} 50%{filter:drop-shadow(0 4px 24px rgba(192,38,211,.9))} }
  @keyframes textReveal { 0%{opacity:0;max-width:0;transform:translateX(-10px)} 100%{opacity:1;max-width:300px;transform:translateX(0)} }

  .gear-btn { position: absolute; top: 32px; left: 32px; z-index: 10; width: 48px; height: 48px; border-radius: 50%; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1.5px solid var(--glass-border); box-shadow: var(--glass-shadow); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--label); animation: slideDown 1.2s cubic-bezier(.4,1.4,.5,1) 0.1s both; transition: all 0.4s cubic-bezier(.4,1.4,.5,1); }
  .gear-btn:hover { transform: rotate(90deg) scale(1.1); box-shadow: 0 12px 30px rgba(192, 38, 211, 0.4); }
  .gear-btn svg { width: 22px; height: 22px; }

  .theme-toggle { position: absolute; top: 32px; right: 48px; z-index: 10; display: flex; align-items: center; gap: 6px; padding: 8px; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1.5px solid var(--glass-border); border-radius: 100px; box-shadow: var(--glass-shadow); animation: slideDown 1.2s cubic-bezier(.4,1.4,.5,1) 0.2s both; transition: all 0.6s ease; }
  .theme-btn { width: 38px; height: 38px; border-radius: 50%; border: none; background: transparent; color: var(--label); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.4s cubic-bezier(.4,1.4,.5,1); }
  .theme-btn svg { width: 20px; height: 20px; transition: transform 0.6s cubic-bezier(.4,1.4,.5,1); }
  .theme-btn:hover { transform: scale(1.2); }
  .theme-btn.active { background: linear-gradient(135deg, var(--p), var(--p-light)); color: white; box-shadow: 0 6px 20px rgba(192, 38, 211, 0.5), inset 0 1px 0 rgba(255,255,255,0.3); }
  .theme-btn.active svg { transform: rotate(360deg); }

  /* LOGIN */
  #loginScreen { position: relative; width: 100vw; height: 100vh; }
  .login-main { display: grid; grid-template-columns: 1fr 0fr; width: 100vw; height: 100vh; transition: grid-template-columns 0.8s cubic-bezier(.6,.05,.2,1); position: relative; z-index: 1; }
  .login-main.split { grid-template-columns: 1.1fr 0.9fr; }
  .orbit-container { display: flex; align-items: center; justify-content: center; position: relative; }
  .orbit-ring { position: absolute; width: 520px; height: 520px; border-radius: 50%; border: 1px dashed rgba(192, 38, 211, 0.2); animation: ringRotate 60s linear infinite, ringFade 1.5s ease 0.5s both; }
  .orbit-ring::before, .orbit-ring::after { content: ""; position: absolute; width: 6px; height: 6px; border-radius: 50%; background: var(--p-glow); box-shadow: 0 0 12px var(--p-glow); }
  .orbit-ring::before { top: -3px; left: 50%; transform: translateX(-50%); }
  .orbit-ring::after { bottom: -3px; left: 50%; transform: translateX(-50%); }
  @keyframes ringRotate { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  @keyframes ringFade { from{opacity:0} to{opacity:1} }

  .center-axis { position: relative; width: 0; height: 0; animation: orbitIntro 1.2s ease 0.3s both; }
  @keyframes orbitIntro { 0%{opacity:0;transform:scale(.6)} 100%{opacity:1;transform:scale(1)} }

  .admin { position: absolute; transform: translate(-50%, -50%); z-index: 5; animation: adminIntro 1s cubic-bezier(.4,1.6,.5,1) 0.8s both; }
  @keyframes adminIntro { 0%{opacity:0;transform:translate(-50%,-50%) scale(0)} 100%{opacity:1;transform:translate(-50%,-50%) scale(1)} }
  .admin .pic { width: 110px; height: 110px; border-radius: 32px; background: linear-gradient(135deg, var(--p), var(--p-light)); border: 2px solid var(--glass-border); box-shadow: 0 25px 55px rgba(107,22,104,.4), 0 0 0 8px rgba(192,38,211,.08), 0 0 60px rgba(192,38,211,.4), inset 0 1px 0 rgba(255,255,255,.3); display: flex; align-items: center; justify-content: center; position: relative; animation: adminGlow 3s ease-in-out infinite; }
  @keyframes adminGlow { 0%,100% { box-shadow: 0 25px 55px rgba(107,22,104,.4), 0 0 0 8px rgba(192,38,211,.08), 0 0 60px rgba(192,38,211,.4), inset 0 1px 0 rgba(255,255,255,.3); } 50% { box-shadow: 0 25px 55px rgba(107,22,104,.5), 0 0 0 14px rgba(192,38,211,.12), 0 0 90px rgba(192,38,211,.7), inset 0 1px 0 rgba(255,255,255,.3); } }
  .admin .pic svg { width: 50px; height: 50px; fill: white; z-index: 2; }
  .sparkle { position: absolute; width: 6px; height: 6px; background: white; border-radius: 50%; box-shadow: 0 0 8px white, 0 0 16px var(--p-glow); pointer-events: none; }
  .sparkle:nth-child(1) { top: -10px; left: 20%; animation: sparkle 2.5s ease-in-out infinite 0s; }
  .sparkle:nth-child(2) { top: 30%; right: -12px; animation: sparkle 2.5s ease-in-out infinite 0.5s; }
  .sparkle:nth-child(3) { bottom: -8px; left: 60%; animation: sparkle 2.5s ease-in-out infinite 1s; }
  .sparkle:nth-child(4) { top: 60%; left: -10px; animation: sparkle 2.5s ease-in-out infinite 1.5s; }
  .sparkle:nth-child(5) { top: 10%; right: 25%; animation: sparkle 2.5s ease-in-out infinite 2s; }
  @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0) rotate(0)} 50%{opacity:1;transform:scale(1.4) rotate(180deg)} }
  .admin .node-label { color: var(--label); font-weight: 800; }

  .node { position: absolute; transform: translate(calc(-50% + var(--x, 0px) + var(--mx, 0px)), calc(-50% + var(--y, 0px) + var(--my, 0px))); will-change: transform; }
  .content { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: scale 0.4s cubic-bezier(.4,1.6,.5,1); }
  .content:hover { scale: 1.18; }
  .content:hover .pic { box-shadow: var(--glass-shadow), 0 0 30px rgba(192, 38, 211, 0.5); }
  .pic { width: 88px; height: 88px; border-radius: 26px; background: var(--glass-strong); border: 1.5px solid var(--glass-border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); overflow: hidden; box-shadow: var(--glass-shadow); display: flex; align-items: center; justify-content: center; transition: all 0.4s ease; }
  .pic img { width: 100%; height: 100%; object-fit: cover; }
  .pic.plus { font-size: 38px; background: linear-gradient(135deg, var(--p), var(--p-glow)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 200; }
  .node-label { font-size: 10px; font-weight: 700; text-transform: uppercase; margin-top: 12px; color: var(--label); letter-spacing: 1.2px; text-shadow: var(--label-shadow); transition: color 0.6s ease; }

  .panel { display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }
  .login-main.split .panel { opacity: 1; pointer-events: auto; }

  .card { background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1.5px solid var(--glass-border); padding: 42px 38px; border-radius: 38px; width: 360px; text-align: center; box-shadow: var(--glass-shadow); animation: fadeIn 0.6s ease; transition: all 0.6s ease; }
  .big-pfp-wrap, .upload { width: 130px; height: 130px; border-radius: 32px; margin: 0 auto 22px; border: 2px solid var(--glass-border); background: var(--input-bg); overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 15px 35px rgba(107, 22, 104, 0.15), inset 0 1px 0 rgba(255,255,255,0.2); }
  .big-pfp-wrap img, .upload img { width: 100%; height: 100%; object-fit: cover; }
  .big-pfp-wrap.admin-pfp { background: linear-gradient(135deg, var(--p), var(--p-light)); }
  .big-pfp-wrap.admin-pfp svg { width: 60px; height: 60px; fill: white; }
  .upload .plus-icon { font-size: 44px; font-weight: 200; background: linear-gradient(135deg, var(--p), var(--p-glow)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .card h2 { margin: 0 0 22px; font-size: 23px; font-weight: 700; background: linear-gradient(135deg, var(--p), var(--p-glow)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 0.5px; }

  .form { display: flex; flex-direction: column; gap: 11px; margin-bottom: 18px; }
  input, select, textarea { width: 100%; padding: 16px; border-radius: 14px; border: 1.5px solid var(--input-border); background: var(--input-bg); text-align: center; outline: none; font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase; font-family: inherit; color: var(--text); transition: all 0.25s; }
  input::placeholder, textarea::placeholder { color: var(--label); opacity: 0.5; }
  input:focus, select:focus, textarea:focus { border-color: var(--p-glow); box-shadow: 0 0 0 4px var(--p-soft), 0 0 20px rgba(192, 38, 211, 0.25); }

  .btn { width: 100%; margin-top: 8px; padding: 18px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--p), var(--p-light), var(--p-glow), var(--p-light), var(--p)); background-size: 300% 300%; color: white; font-weight: 700; cursor: pointer; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; box-shadow: 0 12px 28px rgba(107,22,104,.4), 0 0 30px rgba(192,38,211,.3), inset 0 1px 0 rgba(255,255,255,.3); transition: transform 0.3s cubic-bezier(.4,1.6,.5,1), box-shadow 0.3s; position: relative; overflow: hidden; animation: gradientShift 4s ease infinite; display: flex; align-items: center; justify-content: center; gap: 8px; }
  @keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  .btn::before { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent); transition: left 0.6s ease; }
  .btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 18px 45px rgba(107,22,104,.55), 0 0 50px rgba(192,38,211,.6), inset 0 1px 0 rgba(255,255,255,.3); }
  .btn:hover::before { left: 100%; }
  .btn:active { transform: translateY(-1px) scale(1); }
  .btn:disabled { opacity: 0.6; cursor: wait; transform: none; }
  .btn.btn-sm { padding: 12px 18px; font-size: 11px; width: auto; }
  .btn.btn-ghost { background: var(--glass); color: var(--label); border: 1.5px solid var(--glass-border); box-shadow: var(--glass-shadow); animation: none; }
  .btn.btn-ghost:hover { background: var(--glass-strong); }
  .btn.btn-danger { background: linear-gradient(135deg, #b91c1c, var(--red)); animation: none; }

  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .back { margin-top: 22px; font-size: 11px; cursor: pointer; opacity: 0.55; letter-spacing: 1.5px; text-transform: uppercase; color: var(--label); transition: opacity 0.2s; }
  .back:hover { opacity: 1; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }

  /* DASHBOARD */
  #dashScreen { display: none; position: relative; width: 100vw; height: 100vh; overflow: hidden; }
  #dashScreen.active { display: block; }
  .dash-layout { display: grid; grid-template-columns: 240px 1fr; height: 100vh; position: relative; z-index: 1; }
  .sidebar { margin: 24px 0 24px 24px; padding: 24px 16px; background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1.5px solid var(--glass-border); border-radius: 28px; box-shadow: var(--glass-shadow); display: flex; flex-direction: column; transition: all 0.6s ease; }
  .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 12px 24px; border-bottom: 1px solid var(--divider); margin-bottom: 16px; }
  .sidebar-logo svg { width: 32px; height: 32px; }
  .sidebar-logo svg g { fill: var(--label); }
  .sidebar-logo span { font-size: 14px; letter-spacing: 1px; color: var(--label); font-weight: 400; }
  .sidebar-logo span b { font-weight: 800; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 14px; cursor: pointer; color: var(--text-soft); font-size: 13px; font-weight: 600; margin-bottom: 4px; transition: all 0.25s; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .nav-item:hover { background: var(--glass-strong); color: var(--label); }
  .nav-item.active { background: linear-gradient(135deg, var(--p), var(--p-light)); color: white; box-shadow: 0 6px 20px rgba(192, 38, 211, 0.35); }
  .nav-item.admin-only { display: none; }
  .nav-item.admin-only.show { display: flex; }
  .sidebar-spacer { flex: 1; }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--glass-strong); border-radius: 16px; margin-top: 12px; }
  .sidebar-user img { width: 36px; height: 36px; border-radius: 12px; object-fit: cover; }
  .sidebar-user .name { font-size: 12px; font-weight: 700; color: var(--label); }
  .sidebar-user .role { font-size: 10px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 1px; }
  .sidebar-user button { margin-left: auto; background: none; border: none; color: var(--text-soft); cursor: pointer; padding: 6px; border-radius: 8px; }
  .sidebar-user button:hover { background: var(--glass); color: var(--red); }

  .dash-main { padding: 24px 32px; overflow-y: auto; height: 100vh; }
  .dash-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; gap: 16px; }
  .dash-title { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--p), var(--p-glow)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .dash-subtitle { font-size: 13px; color: var(--text-soft); margin-top: 4px; }
  .dash-actions { display: flex; gap: 10px; align-items: center; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 28px; }
  .stat-card { background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1.5px solid var(--glass-border); border-radius: 22px; padding: 22px; box-shadow: var(--glass-shadow); cursor: pointer; transition: all 0.3s cubic-bezier(.4,1.6,.5,1); position: relative; overflow: hidden; }
  .stat-card::before { content: ""; position: absolute; top: 0; right: 0; width: 80px; height: 80px; background: var(--accent, var(--p-glow)); opacity: 0.1; border-radius: 50%; filter: blur(20px); transition: all 0.3s; }
  .stat-card:hover { transform: translateY(-4px); box-shadow: var(--glass-shadow), 0 0 30px rgba(192, 38, 211, 0.2); }
  .stat-card:hover::before { opacity: 0.25; transform: scale(1.3); }
  .stat-card .stat-icon { width: 42px; height: 42px; border-radius: 12px; background: var(--accent-bg, rgba(192,38,211,.12)); color: var(--accent, var(--p-glow)); display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
  .stat-card .stat-icon svg { width: 22px; height: 22px; }
  .stat-card .stat-value { font-size: 32px; font-weight: 800; color: var(--text); line-height: 1; }
  .stat-card .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-soft); margin-top: 6px; font-weight: 600; }

  .assistant { background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1.5px solid var(--glass-border); border-radius: 22px; padding: 24px; box-shadow: var(--glass-shadow); margin-bottom: 28px; display: flex; align-items: center; gap: 20px; position: relative; overflow: hidden; }
  .assistant::before { content: ""; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 0%, rgba(192,38,211,.05) 100%); pointer-events: none; }
  .assistant-icon { width: 56px; height: 56px; border-radius: 18px; background: linear-gradient(135deg, var(--p), var(--p-light)); display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 20px rgba(192, 38, 211, 0.4); flex-shrink: 0; }
  .assistant-icon svg { width: 28px; height: 28px; }
  .assistant-content { flex: 1; }
  .assistant-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-soft); font-weight: 700; }
  .assistant-name { font-size: 18px; font-weight: 700; color: var(--text); margin: 4px 0 2px; }
  .assistant-desc { font-size: 12px; color: var(--text-soft); }

  .panel-card { background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1.5px solid var(--glass-border); border-radius: 22px; padding: 22px; box-shadow: var(--glass-shadow); margin-bottom: 28px; }
  .panel-card h3 { margin: 0 0 16px; font-size: 14px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--label); font-weight: 700; }

  .badges { display: flex; flex-wrap: wrap; gap: 8px; }
  .badge { padding: 6px 14px; background: var(--glass-strong); border: 1px solid var(--glass-border); border-radius: 100px; font-size: 12px; color: var(--text); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--orange); }

  .team-card .team-bar { height: 4px; background: var(--input-bg); border-radius: 100px; margin-top: 6px; overflow: hidden; }

  .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-pill { padding: 8px 16px; background: var(--glass); border: 1.5px solid var(--glass-border); border-radius: 100px; font-size: 12px; color: var(--text-soft); cursor: pointer; transition: all 0.25s; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .filter-pill:hover { color: var(--label); }
  .filter-pill.active { background: linear-gradient(135deg, var(--p), var(--p-light)); color: white; border-color: transparent; box-shadow: 0 4px 12px rgba(192, 38, 211, 0.3); }
  .search-input { flex: 1; min-width: 200px; padding: 10px 16px; text-transform: none; text-align: left; letter-spacing: 0; font-size: 13px; }

  .contacts-table { background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1.5px solid var(--glass-border); border-radius: 22px; box-shadow: var(--glass-shadow); overflow: hidden; }
  .contact-row { display: grid; grid-template-columns: 2fr 1.5fr 1.5fr 1fr 1fr 80px; align-items: center; padding: 14px 22px; border-bottom: 1px solid var(--divider); cursor: pointer; transition: background 0.2s; font-size: 13px; }
  .contact-row:last-child { border-bottom: none; }
  .contact-row:hover { background: var(--glass-strong); }
  .contact-row.header { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-soft); font-weight: 700; cursor: default; background: var(--input-bg); }
  .contact-row.header:hover { background: var(--input-bg); }

  .status-pill { display: inline-block; padding: 4px 10px; border-radius: 100px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }

  .row-actions { display: flex; gap: 4px; justify-content: flex-end; }
  .icon-btn { width: 28px; height: 28px; border-radius: 8px; border: none; background: transparent; color: var(--text-soft); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }

  .empty-state { padding: 60px 22px; text-align: center; color: var(--text-soft); font-size: 13px; }

  /* Tags libres */
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 100px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }

  /* Charts simples */
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: grid; grid-template-columns: 120px 1fr 50px; align-items: center; gap: 12px; font-size: 12px; }
  .bar-row .bar-label { color: var(--text); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-row .bar-track { height: 10px; background: var(--input-bg); border-radius: 100px; overflow: hidden; }
  .bar-row .bar-fill { height: 100%; background: linear-gradient(90deg, var(--p), var(--p-glow)); border-radius: 100px; transition: width 0.8s cubic-bezier(.4,1.4,.5,1); }

  /* MODALES */
  .modal-overlay { position: fixed; inset: 0; background: rgba(20, 10, 25, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1.5px solid var(--glass-border); border-radius: 28px; padding: 32px; width: 460px; max-width: 90vw; max-height: 88vh; overflow-y: auto; box-shadow: var(--glass-shadow); animation: modalIn 0.4s cubic-bezier(.4,1.4,.5,1); }
  .modal.modal-lg { width: 720px; }

  @keyframes modalIn { from{opacity:0;transform:translateY(20px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
  .modal h2 { margin: 0 0 22px; font-size: 22px; background: linear-gradient(135deg, var(--p), var(--p-glow)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
  .modal h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-soft); margin: 18px 0 10px; font-weight: 700; }
  .modal-form { display: flex; flex-direction: column; gap: 11px; }

  /* Tabs in modals */

  .tab-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: transparent; color: var(--text-soft); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; cursor: pointer; transition: all 0.2s; }
  .tab-btn.active { background: var(--glass-strong); color: var(--label); box-shadow: var(--glass-shadow); }

  .admin-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; max-height: 360px; overflow-y: auto; padding-right: 4px; }
  .admin-list-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--glass-strong); border: 1px solid var(--glass-border); border-radius: 14px; }
  .admin-list-item img { width: 36px; height: 36px; border-radius: 10px; object-fit: cover; }
  .admin-list-item .info { flex: 1; min-width: 0; }
  .admin-list-item .info-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .admin-list-item .info-mail { font-size: 11px; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .admin-list-item .info-meta { font-size: 10px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.5px; }

  /* Logs */
  .logs-list { display: flex; flex-direction: column; gap: 6px; max-height: 400px; overflow-y: auto; padding-right: 4px; }
  .log-item { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; padding: 10px 14px; background: var(--glass-strong); border: 1px solid var(--glass-border); border-radius: 12px; align-items: center; font-size: 12px; }
  .log-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .log-icon svg { width: 14px; height: 14px; color: white; }
  .log-action { color: var(--text); }
  .log-action b { color: var(--label); }
  .log-time { font-size: 10px; color: var(--text-soft); white-space: nowrap; }

  /* Maintenance banner */
  .maintenance-banner { position: fixed; top: 0; left: 0; right: 0; padding: 10px; background: linear-gradient(135deg, var(--orange), var(--yellow)); color: white; text-align: center; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; z-index: 50; box-shadow: 0 4px 20px rgba(234, 88, 12, 0.4); display: none; }
  .maintenance-banner.show { display: block; }

  /* Toast */
  #toast-container { position: fixed; top: 100px; right: 32px; z-index: 200; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
  .toast { padding: 14px 20px; background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1.5px solid var(--glass-border); border-radius: 14px; box-shadow: var(--glass-shadow); display: flex; align-items: center; gap: 12px; font-size: 13px; font-weight: 600; color: var(--text); min-width: 260px; max-width: 380px; animation: toastIn 0.4s cubic-bezier(.4,1.6,.5,1); pointer-events: auto; }
  .toast.success { border-left: 4px solid var(--green); }
  .toast.error { border-left: 4px solid var(--red); }
  .toast.info { border-left: 4px solid var(--blue); }
  .toast .toast-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; }
  .toast.success .toast-icon { background: var(--green); }
  .toast.error .toast-icon { background: var(--red); }
  .toast.info .toast-icon { background: var(--blue); }
  .toast .toast-icon svg { width: 14px; height: 14px; }
  @keyframes toastIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
  @keyframes toastOut { to{opacity:0;transform:translateX(40px)} }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(107, 22, 104, 0.25); border-radius: 100px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(107, 22, 104, 0.4); }
  ::-webkit-scrollbar-track { background: transparent; }

  .timeline { display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; }
  .timeline-item { display: grid; grid-template-columns: 8px 1fr; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--divider); font-size: 12px; }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--p-glow); margin-top: 5px; box-shadow: 0 0 8px var(--p-glow); }

  @media (max-width: 1100px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }

  }

  /* ===== MOBILE BOTTOM NAV ===== */

  /* ===== CALENDAR ===== */
  .calendar-wrap { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
  @media (max-width: 900px) { .calendar-wrap { grid-template-columns: 1fr; } }

  .calendar { background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1.5px solid var(--glass-border); border-radius: 22px; padding: 22px; box-shadow: var(--glass-shadow); }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

  .events-list { display: flex; flex-direction: column; gap: 10px; max-height: 500px; overflow-y: auto; }

  /* NOTIFICATIONS BELL */
  .notif-bell { position: relative; width: 44px; height: 44px; border-radius: 14px; border: 1.5px solid var(--glass-border); background: var(--glass-strong); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--label); transition: all 0.25s; }

  .notif-panel-header button { background: none; border: none; color: var(--text-soft); font-size: 11px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .notif-panel-header button:hover { color: var(--label); }
  .notif-list { flex: 1; overflow-y: auto; padding: 8px; max-height: 400px; }
  .notif-item { display: grid; grid-template-columns: 36px 1fr auto; gap: 12px; padding: 12px; border-radius: 14px; margin-bottom: 4px; cursor: pointer; transition: background 0.2s; align-items: start; position: relative; }
  .notif-item:hover { background: var(--glass-strong); }
  .notif-item.unread { background: rgba(192, 38, 211, 0.08); }
  .notif-icon-wrap { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .notif-icon-wrap.success { background: rgba(22,163,74,.15); color: var(--green); }
  .notif-icon-wrap.info    { background: rgba(37,99,235,.15); color: var(--blue); }
  .notif-icon-wrap.warning { background: rgba(234,88,12,.15); color: var(--orange); }
  .notif-icon-wrap svg { width: 18px; height: 18px; }
  .notif-item .notif-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .notif-item .notif-msg { font-size: 12px; color: var(--text-soft); margin-top: 2px; line-height: 1.4; }
  .notif-item .notif-time { font-size: 10px; color: var(--text-soft); white-space: nowrap; }
  .notif-empty { padding: 40px 20px; text-align: center; color: var(--text-soft); font-size: 12px; }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

  /* SLIDE-IN NOTIFICATION POPUP */
  .notif-popup { position: fixed; top: 90px; right: 32px; z-index: 160; width: 340px; padding: 16px 18px; background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1.5px solid var(--glass-border); border-left: 4px solid var(--p-glow); border-radius: 18px; box-shadow: var(--glass-shadow); display: flex; gap: 12px; align-items: flex-start; animation: slideInRight 0.4s cubic-bezier(.4,1.6,.5,1); }
  .notif-popup .notif-icon-wrap { width: 40px; height: 40px; }
  .notif-popup .notif-title { font-size: 13px; font-weight: 800; color: var(--label); }
  .notif-popup .notif-msg { font-size: 12px; color: var(--text); margin-top: 3px; }
  .notif-popup .notif-close { background: none; border: none; color: var(--text-soft); cursor: pointer; font-size: 20px; padding: 0; line-height: 1; }

  /* GROUP SELECTOR (sidebar) */
  .group-selector { padding: 12px 14px; background: var(--glass-strong); border: 1px solid var(--glass-border); border-radius: 14px; margin: 12px 0; }
  .group-selector label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-soft); font-weight: 700; display: block; margin-bottom: 8px; }
  .group-selector select { width: 100%; padding: 10px 12px; font-size: 12px; background: var(--input-bg); border: 1.5px solid var(--input-border); text-transform: none; letter-spacing: 0; border-radius: 10px; color: var(--text); cursor: pointer; min-height: 40px; }
  .group-selector select:focus { border-color: var(--p-glow); outline: none; }

  .group-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 100px; background: linear-gradient(135deg, var(--p), var(--p-light)); color: white; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-left: 6px; }

</style>

async function loadData() {
  if (FIREBASE_READY) {
    try {
      const [s1, s2, s3, s4, s5, s6, s7] = await Promise.all([
        getDocs(collection(db, "staff")),
        getDocs(collection(db, "contacts")),
        getDocs(collection(db, "logs")),
        getDocs(collection(db, "settings")),
        getDocs(collection(db, "events")),
        getDocs(collection(db, "groups")),
        getDocs(collection(db, "notifications")),
      ]);
      state.staff = s1.docs.map(d => ({ id: d.id, ...d.data() }));
      state.contacts = s2.docs.map(d => ({ id: d.id, ...d.data() }));
      state.logs = s3.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.at - a.at);
      const sd = s4.docs.find(d => d.id === "main");
      if (sd) state.settings = { ...state.settings, ...sd.data() };
      state.events = s5.docs.map(d => ({ id: d.id, ...d.data() }));
      state.groups = s6.docs.map(d => ({ id: d.id, ...d.data() }));
      state.notifications = s7.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.at - a.at);
      applySettings();
      onSnapshot(collection(db, "staff"), s => { state.staff = s.docs.map(d => ({ id: d.id, ...d.data() })); rerender(); renderOrbit(); });
      onSnapshot(collection(db, "contacts"), s => { state.contacts = s.docs.map(d => ({ id: d.id, ...d.data() })); rerender(); });
      onSnapshot(collection(db, "logs"), s => { state.logs = s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.at - a.at); });
      onSnapshot(collection(db, "events"), s => { state.events = s.docs.map(d => ({ id: d.id, ...d.data() })); rerender(); });
      onSnapshot(collection(db, "groups"), s => { state.groups = s.docs.map(d => ({ id: d.id, ...d.data() })); rerender(); updateGroupSelector(); });
      onSnapshot(collection(db, "notifications"), s => { state.notifications = s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.at - a.at); refreshNotifBell(); });
    } catch (err) {
      console.error("Firebase load failed:", err);
      toast("Connexion Firebase échouée — mode local", "error");
      loadLocal();
    }
  } else {
    loadLocal();
  }
}
function clean(obj) {
  const out = {};
  for (const k in obj) {
    if (obj[k] !== undefined && obj[k] !== null) out[k] = obj[k];
  }
  return out;
}
async function saveDoc(coll, id, data) {
  const cleaned = clean({ ...data, updatedAt: Date.now() });
  if (FIREBASE_READY) {
    try {
      await setDoc(doc(db, coll, id), cleaned, { merge: true });
      return true;
    } catch (err) { console.error("Save failed:", err); throw err; }
  } else {
    const arr = coll === "staff" ? state.staff
              : coll === "contacts" ? state.contacts
              : coll === "logs" ? state.logs
              : coll === "events" ? state.events
              : coll === "groups" ? state.groups
              : coll === "notifications" ? state.notifications
              : null;
    if (arr) {
      const idx = arr.findIndex(x => x.id === id);
      if (idx >= 0) arr[idx] = { ...arr[idx], ...cleaned, id };
      else arr.unshift({ ...cleaned, id });
    }
    if (coll === "settings") state.settings = { ...state.settings, ...cleaned };
    saveLocal();
    return true;
  }
}
async function deleteDocById(coll, id) {
  if (FIREBASE_READY) {
    try { await deleteDoc(doc(db, coll, id)); return true; }
    catch (err) { console.error("Delete failed:", err); throw err; }
  } else {
    if (coll === "staff") state.staff = state.staff.filter(s => s.id !== id);
    else if (coll === "contacts") state.contacts = state.contacts.filter(c => c.id !== id);
    saveLocal();
    return true;
  }
}

function setupParticles() {
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");
  let parts = [];
  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resize();
  window.addEventListener("resize", resize);
  for (let i = 0; i < 50; i++) parts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+0.5, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, a: Math.random()*0.5+0.2 });
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const color = getComputedStyle(document.documentElement).getPropertyValue('--particle').trim();
    parts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fillStyle = color; ctx.globalAlpha = p.a; ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
}

function playAlertSound(type) {
  const prefs = getUserPrefs();
  if (!prefs.soundAlerts) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const sounds = {
      chime: [{f:880,t:0},{f:1320,t:0.12}],
      ding:  [{f:1760,t:0}],
      pop:   [{f:440,t:0},{f:880,t:0.08}],
      bell:  [{f:660,t:0},{f:990,t:0.1},{f:1320,t:0.2}],
    };
    const notes = sounds[prefs.soundType || "chime"] || sounds.chime;
    notes.forEach(n => { osc.frequency.setValueAtTime(n.f, ctx.currentTime + n.t); });
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  } catch (e) {}
}

async function requestNotifPermission() {

  return p === "granted";
}

}

const ROTATION_SPEED = 6;
const RADIUS = 250;
let nodes = [];

let isPaused = false;
document.addEventListener("mouseover", e => { if (e.target.closest(".content") && !e.target.closest(".admin")) isPaused = true; });
document.addEventListener("mouseout", e => { if (e.target.closest(".content") && !e.target.closest(".admin")) { if (!e.relatedTarget || !e.relatedTarget.closest(".content") || e.relatedTarget.closest(".admin")) isPaused = false; } });
let mouseX = -9999, mouseY = -9999;
document.addEventListener("mousemove", e => { mouseX = e.clientX; mouseY = e.clientY; });
let lastNow = performance.now();
let accumulated = 0;
function animate(now) {
  const dt = (now - lastNow) / 1000;
  lastNow = now;
  if (!isPaused) accumulated += dt;
  const globalRot = accumulated * ROTATION_SPEED;
  nodes.forEach(n => {
    const a = (n.baseAngle + globalRot) * Math.PI / 180;
    const x = Math.sin(a) * RADIUS;
    const y = -Math.cos(a) * RADIUS;
    n.el.style.setProperty("--x", x + "px");
    n.el.style.setProperty("--y", y + "px");
    // Magnetic désactivé quand on survole un node (évite le tremblement)
    if (isPaused) {
      n.mx += (0 - n.mx) * 0.15;
      n.my += (0 - n.my) * 0.15;
    } else {
      const rect = n.el.getBoundingClientRect();
      const cx = rect.left + rect.width/2;
      const cy = rect.top + rect.height/2;
      const dx = mouseX - cx;
      const dy = mouseY - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const MAX = 150;
      if (dist < MAX && dist > 20) { const force = (1 - dist/MAX) * 20; n.mx += ((dx/dist)*force - n.mx) * 0.12; n.my += ((dy/dist)*force - n.my) * 0.12; }
      else { n.mx += (0 - n.mx) * 0.12; n.my += (0 - n.my) * 0.12; }
    }
    n.el.style.setProperty("--mx", n.mx + "px");
    n.el.style.setProperty("--my", n.my + "px");
  });
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

function renderLoginPanel() {
  if (state.loginSelected) {
    const u = state.loginSelected;
    const pfp = u.isAdmin
      ? `<div class="big-pfp-wrap admin-pfp"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 16L3 7l5.5 4L12 4l3.5 7L21 7l-2 9H5zm0 2h14v2H5v-2z"/></svg></div>`
      : `<div class="big-pfp-wrap"><img src="${u.img}"/></div>`;
    panel.innerHTML = `<div class="card">${pfp}<h2>${u.nom}</h2><input type="password" id="loginPass" placeholder="Mot de passe"/><button class="btn" id="loginBtn"><span>Connexion</span></button><p class="back" id="backBtn">Retour</p></div>`;
    document.getElementById("loginBtn").addEventListener("click", doLogin);
    document.getElementById("loginPass").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  } else if (state.loginIsAdd) {
    panel.innerHTML = `<div class="card"><div class="upload" id="uploadZone">${state.loginNewPic ? `<img src="${state.loginNewPic}"/>` : `<span class="plus-icon">+</span>`}<input type="file" id="fileInput" hidden accept="image/*"/></div><h2>Nouveau profil</h2><div class="form"><input id="newName" placeholder="Nom & prénom"/><input id="newMail" placeholder="Adresse mail" type="email"/><input id="newPass" type="password" placeholder="Mot de passe"/></div><button class="btn" id="createBtn"><span>Créer le profil</span></button><p class="back" id="backBtn">Retour</p></div>`;
    const fi = document.getElementById("fileInput");
    document.getElementById("uploadZone").addEventListener("click", () => fi.click());
    fi.addEventListener("change", e => { const f = e.target.files[0]; if (f) { state.loginNewPic = URL.createObjectURL(f); renderLoginPanel(); } });
    document.getElementById("createBtn").addEventListener("click", createProfile);
  }
  document.getElementById("backBtn")?.addEventListener("click", closeLoginPanel);
}
function closeLoginPanel() { state.loginSelected = null; state.loginIsAdd = false; state.loginIsAdmin = false; loginMain.classList.remove("split"); }

async function doLogin() {
  const pass = document.getElementById("loginPass").value;
  const btn = document.getElementById("loginBtn");
  if (state.loginIsAdmin) {
    if (pass === state.settings.adminCode) {
      state.currentUser = { nom: "Administrateur", isAdmin: true, role: "admin", img: null };
      logActivity("Connexion admin");
      enterDashboard();
    } else { toast("Code administrateur incorrect", "error"); }
    return;
  }
  if (state.settings.maintenanceMode) { toast("Mode maintenance — accès admin uniquement", "error"); return; }
  setLoading(btn, true);
  if (state.loginSelected.pass === pass || pass === "1234") {
    state.currentUser = state.loginSelected;
    logActivity("Connexion", state.loginSelected.nom);
    toast("Connexion réussie", "success");
    setTimeout(() => enterDashboard(), 400);
  } else { setLoading(btn, false); toast("Mot de passe incorrect", "error"); }
}

async function createProfile() {
  const nom  = document.getElementById("newName").value.trim();
  const mail = document.getElementById("newMail").value.trim();
  const pass = document.getElementById("newPass").value;
  const btn = document.getElementById("createBtn");
  if (!nom || !mail) { toast("Nom et email requis", "error"); return; }
  setLoading(btn, true);
  const id = "u" + Date.now();
  const data = { nom, email: mail, pass, role: "member", img: state.loginNewPic || `https://i.pravatar.cc/150?u=${encodeURIComponent(nom)}`, createdAt: Date.now() };
  try {
    await saveDoc("staff", id, data);
    await logActivity("Création profil", nom);
    toast("Profil créé", "success");
    // Ajout optimiste au state local pour affichage immédiat
    if (!state.staff.find(s => s.id === id)) state.staff.push({ id, ...data });
    renderOrbit();
    closeLoginPanel();
  } catch (err) { console.error(err); toast("Erreur lors de la création", "error"); }
  finally { setLoading(btn, false); }
}

const modalOverlay = document.getElementById("modalOverlay");

  modalContent.className = "modal " + size;
  modalContent.innerHTML = html;
  modalOverlay.classList.add("active");

function closeModal() { modalOverlay.classList.remove("active"); }
modalOverlay.addEventListener("click", e => { if (e.target === modalOverlay) closeModal(); });

document.getElementById("gearBtn").addEventListener("click", () => {
  openModal(`<h2>Accès administrateur</h2><div class="modal-form"><label>Code secret</label><input type="password" id="adminCode" placeholder="••••" autofocus/></div><div class="modal-actions"><button class="btn btn-ghost" id="cancelAdmin">Annuler</button><button class="btn" id="validateAdmin">Valider</button></div>`);
  document.getElementById("cancelAdmin").addEventListener("click", closeModal);
  document.getElementById("validateAdmin").addEventListener("click", validateAdminCode);
  document.getElementById("adminCode").addEventListener("keydown", e => { if (e.key === "Enter") validateAdminCode(); });
});
function validateAdminCode() {
  const code = document.getElementById("adminCode").value;
  if (code === state.settings.adminCode) {
    state.currentUser = { nom: "Administrateur", isAdmin: true, role: "admin", img: null };
    closeModal();
    logActivity("Connexion admin");
    enterDashboard();
  } else { toast("Code incorrect", "error"); }
}

// ============================================================
// DASHBOARD
// ============================================================
function enterDashboard() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("dashScreen").classList.add("active");
  state.view = "dashboard";
  renderSidebar();
  renderDashboard();
}
function renderSidebar() {
  const u = state.currentUser;
  const img = u.img || `https://i.pravatar.cc/150?u=admin`;
  document.getElementById("sidebarUser").innerHTML = `<img src="${img}" alt=""/><div><div class="name">${u.nom}</div><div class="role">${u.isAdmin ? "Admin" : "Membre"}</div></div><button id="logoutBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>`;
  document.getElementById("logoutBtn").addEventListener("click", logout);

  // Notif bell binding
  const bell = document.getElementById("notifBell");
  const panel = document.getElementById("notifPanel");
  if (bell && panel) {
    bell.onclick = (e) => {
      e.stopPropagation();
      panel.classList.toggle("open");
      if (panel.classList.contains("open")) renderNotifList();
    };
    document.getElementById("markAllRead").onclick = async () => {
      for (const n of state.notifications) {
        if (!n.read) {
          n.read = true;
          if (FIREBASE_READY) { try { await saveDoc("notifications", n.id, n); } catch {} }
        }
      }
      if (!FIREBASE_READY) saveLocal();
      refreshNotifBell();
      renderNotifList();
    };
    // Click outside closes panel
    document.addEventListener("click", e => {
      if (!panel.contains(e.target) && !bell.contains(e.target)) panel.classList.remove("open");
    });
  }
  refreshNotifBell();
  updateGroupSelector();
  document.querySelectorAll(".nav-item.admin-only").forEach(el => el.classList.toggle("show", !!u.isAdmin));
  document.querySelectorAll(".nav-item").forEach(item => {
    item.classList.toggle("active", item.dataset.view === state.view);
    item.onclick = () => { state.view = item.dataset.view; state.selectedStatus = null; state.onlyUnassigned = false; state.onlyContacted = false; renderSidebar(); rerender(); };
  });
  // Mobile nav
  document.querySelectorAll(".mobile-nav-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.mview === state.view);
    btn.onclick = () => { state.view = btn.dataset.mview; state.selectedStatus = null; state.onlyUnassigned = false; state.onlyContacted = false; renderSidebar(); rerender(); };
  });
}
function logout() {
  logActivity("Déconnexion");
  state.currentUser = null;
  document.getElementById("dashScreen").classList.remove("active");
  document.getElementById("loginScreen").style.display = "block";
  closeLoginPanel();
}

function renderDashboard() {
  if (state.view !== "dashboard") return;
  const total = state.contacts.length;
  const unassigned = state.contacts.filter(c => !c.assignedTo).length;
  const contacted = state.contacts.filter(c => c.statut && c.statut !== "nouveau").length;
  const sansrep = state.contacts.filter(c => c.statut === "sansrep").length;
  const next = state.contacts.find(c => c.statut === "nouveau") || state.contacts.find(c => c.statut === "encours");
  const inactive = state.contacts.filter(c => c.statut === "sansrep");

  // RDV à venir (7 jours)
  const now = Date.now();
  const upcoming = (state.events || [])
    .filter(e => e.date >= now && e.date < now + 7 * 86400000)
    .sort((a, b) => a.date - b.date)
    .slice(0, 5);

  const teamHtml = state.staff.map(s => {
    const myContacts = state.contacts.filter(c => c.assignedTo === s.id);
    const myDone = myContacts.filter(c => c.statut === "traite").length;
    const pct = myContacts.length ? Math.round((myDone / myContacts.length) * 100) : 0;
    return `<div class="team-card"><img src="${s.img}" alt=""/><div class="team-info"><div class="team-name">${s.nom}</div><div class="team-stat">${myDone}/${myContacts.length} traités${state.settings.quotaPerUser ? " / quota " + state.settings.quotaPerUser : ""}</div><div class="team-bar"><div class="team-bar-fill" style="width:${pct}%"></div></div></div></div>`;
  }).join("");

  const statsCards = [
    { key: "all",        label: "Total leads",     value: total,      color: "#9a1f96", bg: "rgba(154,31,150,.12)", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>' },
    { key: "unassigned", label: "Non attribués",   value: unassigned, color: "#eab308", bg: "rgba(234,179,8,.12)",  icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' },
    { key: "contacted",  label: "Déjà contactés",  value: contacted,  color: "#2563eb", bg: "rgba(37,99,235,.12)",  icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>' },
    { key: "sansrep",    label: "Sans réponse",    value: sansrep,    color: "#dc2626", bg: "rgba(220,38,38,.12)",  icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' },
  ];

  const rdvHtml = upcoming.length ? upcoming.map(e => {
    const d = new Date(e.date);
    const day = d.toLocaleDateString("fr-FR", { weekday: "short", day: "2-digit", month: "short" });
    const h = d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    return `<div class="event-item" data-ev-id="${e.id}"><div class="event-time"><div>${day}</div><div class="h">${h}</div></div><div><div class="event-title">${e.title}</div><div class="event-desc">${e.desc || ""}</div></div><div></div></div>`;
  }).join("") : '<div class="empty-state" style="padding:20px;">Aucun rendez-vous dans les 7 prochains jours</div>';

  document.getElementById("dashMain").innerHTML = `
    <div class="dash-header"><div><div class="dash-title">Bonjour ${state.currentUser.nom.split(" ")[0]} 👋</div><div class="dash-subtitle">Voici l'état de tes prospects aujourd'hui</div></div></div>
    <div class="stats-grid">
      ${statsCards.map(c => `<div class="stat-card" data-filter="${c.key}" style="--accent:${c.color};--accent-bg:${c.bg}"><div class="stat-icon">${c.icon}</div><div class="stat-value">${c.value}</div><div class="stat-label">${c.label}</div></div>`).join("")}
    </div>
    ${next ? `<div class="assistant"><div class="assistant-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div><div class="assistant-content"><div class="assistant-label">Prochain contact suggéré</div><div class="assistant-name">${next.nom}</div><div class="assistant-desc">${next.ville || ""} · ${next.tel || next.email || ""}</div></div><button class="btn btn-sm" id="openNext">Ouvrir</button></div>` : ""}
    <div class="panel-card">
      <h3>📅 Prochains rendez-vous</h3>
      <div class="event-list" style="margin-top:0;">${rdvHtml}</div>
    </div>
    ${inactive.length ? `<div class="panel-card"><h3>⚠️ Contacts sans activité</h3><div class="badges">${inactive.slice(0, 30).map(c => `<div class="badge" data-id="${c.id}">${c.nom}</div>`).join("")}</div></div>` : ""}
    <div class="panel-card"><h3>👥 Avancement de l'équipe</h3><div class="team-grid">${teamHtml}</div></div>
  `;
  document.querySelectorAll(".stat-card").forEach(card => {
    card.addEventListener("click", () => {
      const f = card.dataset.filter;
      state.view = "contacts";
      if (f === "all") { state.selectedStatus = null; state.onlyUnassigned = false; state.onlyContacted = false; }
      else if (f === "unassigned") { state.selectedStatus = null; state.onlyUnassigned = true; state.onlyContacted = false; }
      else if (f === "contacted")  { state.selectedStatus = null; state.onlyUnassigned = false; state.onlyContacted = true; }
      else { state.selectedStatus = f; state.onlyUnassigned = false; state.onlyContacted = false; }
      renderSidebar(); renderContacts();
    });
  });
  document.getElementById("openNext")?.addEventListener("click", () => openContactModal(next.id));
  document.querySelectorAll(".badge[data-id]").forEach(b => b.addEventListener("click", () => openContactModal(b.dataset.id)));
  document.querySelectorAll(".event-item[data-ev-id]").forEach(el => el.addEventListener("click", () => openEventModal(el.dataset.evId)));
}

// ============================================================
// CONTACTS VIEW
// ============================================================
function renderContacts() {
  if (state.view !== "contacts") return;
  const filtered = state.contacts.filter(c => {
    if (state.activeGroup && c.groupId !== state.activeGroup) return false;
    if (state.selectedStatus && c.statut !== state.selectedStatus) return false;
    if (state.onlyUnassigned && c.assignedTo) return false;
    if (state.onlyContacted && (!c.statut || c.statut === "nouveau")) return false;
    if (state.search) {
      const s = state.search.toLowerCase();
      return (c.nom || "").toLowerCase().includes(s) || (c.email || "").toLowerCase().includes(s) || (c.ville || "").toLowerCase().includes(s);
    }
    return true;
  });
  const pills = [{ key: null, label: "Tous" }, ...state.settings.statuses.map(s => ({ key: s.key, label: s.label }))]
    .map(p => `<div class="filter-pill ${state.selectedStatus === p.key ? "active" : ""}" data-status="${p.key || ""}">${p.label}</div>`).join("");
  const rows = filtered.map(c => {
    const tags = (c.tags || []).map(t => `<span class="tag" style="background:${t.color}22;color:${t.color}">${t.label}</span>`).join("");
    return `<div class="contact-row" data-id="${c.id}"><div data-label="Nom"><strong>${c.nom}</strong> ${tags}</div><div data-label="Email">${c.email || "—"}</div><div data-label="Téléphone">${phoneLink(c.tel)}</div><div data-label="Ville">${c.ville || "—"}</div><div data-label="Statut">${statusPill(c.statut)}</div><div class="row-actions"><button class="icon-btn" data-edit="${c.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="icon-btn" data-del="${c.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button></div></div>`;
  }).join("");
  document.getElementById("dashMain").innerHTML = `
    <div class="dash-header"><div><div class="dash-title">Contacts</div><div class="dash-subtitle">${filtered.length} contact${filtered.length > 1 ? "s" : ""}</div></div><div class="dash-actions"><button class="btn btn-sm" id="exportCsv">Export CSV</button><button class="btn btn-sm" id="newContact">+ Nouveau</button></div></div>
    <div class="filter-bar">${pills}<input class="search-input" id="searchInput" placeholder="Rechercher..." value="${state.search}"/></div>
    <div class="contacts-table"><div class="contact-row header"><div>Nom</div><div>Email</div><div>Téléphone</div><div>Ville</div><div>Statut</div><div></div></div>${rows || '<div class="empty-state">Aucun contact trouvé</div>'}</div>
  `;
  document.querySelectorAll(".filter-pill").forEach(p => p.addEventListener("click", () => { state.selectedStatus = p.dataset.status || null; state.onlyUnassigned = false; state.onlyContacted = false; renderContacts(); }));
  document.getElementById("searchInput").addEventListener("input", e => { state.search = e.target.value; renderContacts(); });
  document.querySelectorAll(".contact-row[data-id]").forEach(r => r.addEventListener("click", e => { if (e.target.closest(".icon-btn")) return; openContactModal(r.dataset.id); }));
  document.querySelectorAll("[data-edit]").forEach(b => b.addEventListener("click", () => openContactModal(b.dataset.edit)));
  document.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", () => confirmDeleteContact(b.dataset.del)));
  document.getElementById("newContact").addEventListener("click", () => openContactModal(null));
  document.getElementById("exportCsv").addEventListener("click", () => exportContactsCSV(filtered));
}

function openContactModal(id) {
  const c = id ? state.contacts.find(x => x.id === id) : { nom: "", email: "", tel: "", ville: "", statut: "nouveau", notes: "", tags: [], history: [], custom: {}, assignedTo: state.currentUser?.id || "" };
  if (!c) return;
  const isNew = !id;
  const customFieldsHtml = state.settings.customFields.map(f =>
    `<label>${f.label}</label><input id="ct_custom_${f.key}" type="${f.type || 'text'}" value="${(c.custom && c.custom[f.key]) || ''}"/>`
  ).join("");
  const historyHtml = (c.history || []).slice(0, 8).map(h => `<div class="timeline-item"><div class="timeline-dot"></div><div><div class="timeline-content">${h.text}</div><div class="timeline-time">${new Date(h.at).toLocaleString("fr-FR")}</div></div></div>`).join("");
  openModal(`
    <h2>${isNew ? "Nouveau contact" : c.nom}</h2>
    <div class="modal-form">
      <label>Nom</label><input id="ct_nom" value="${c.nom || ''}"/>
      <div class="modal-form-row">
        <div><label>Email</label><input id="ct_email" type="email" value="${c.email || ''}"/></div>
        <div><label>Téléphone</label><input id="ct_tel" value="${c.tel || ''}"/></div>
      </div>
      <div class="modal-form-row">
        <div><label>Ville</label><input id="ct_ville" value="${c.ville || ''}"/></div>
        <div><label>Statut</label><select id="ct_statut">${state.settings.statuses.map(s => `<option value="${s.key}" ${s.key === c.statut ? "selected" : ""}>${s.label}</option>`).join("")}</select></div>
      </div>
      <label>Assigné à</label>
      <select id="ct_assigned"><option value="">— Personne —</option>${state.staff.map(s => `<option value="${s.id}" ${s.id === c.assignedTo ? "selected" : ""}>${s.nom}</option>`).join("")}</select>
      <label>Groupe</label>
      <select id="ct_group"><option value="">— Aucun —</option>${state.groups.map(g => `<option value="${g.id}" ${g.id === c.groupId ? "selected" : ""}>${g.name}</option>`).join("")}</select>
      ${customFieldsHtml}
      <label>Notes</label><textarea id="ct_notes">${c.notes || ''}</textarea>
      <label>Ajouter à l'historique</label><input id="ct_newHist" placeholder="Ex: Appel téléphonique, message envoyé..."/>
      ${historyHtml ? `<h3 style="margin-top:14px;">Historique</h3><div class="timeline">${historyHtml}</div>` : ""}
    </div>
    <div class="modal-actions">
      ${!isNew ? '<button class="btn btn-danger" id="delCt">Supprimer</button>' : ''}
      <button class="btn btn-ghost" id="cancelCt">Annuler</button>
      <button class="btn" id="saveCt">Enregistrer</button>
    </div>
  `, "modal-lg");
  document.getElementById("cancelCt").addEventListener("click", closeModal);
  document.getElementById("delCt")?.addEventListener("click", () => confirmDeleteContact(id));
  document.getElementById("saveCt").addEventListener("click", async () => {
    const btn = document.getElementById("saveCt");
    setLoading(btn, true);
    const data = {
      nom: document.getElementById("ct_nom").value.trim(),
      email: document.getElementById("ct_email").value.trim(),
      tel: document.getElementById("ct_tel").value.trim(),
      ville: document.getElementById("ct_ville").value.trim(),
      statut: document.getElementById("ct_statut").value,
      assignedTo: document.getElementById("ct_assigned").value,
      groupId: document.getElementById("ct_group").value || null,
      notes: document.getElementById("ct_notes").value.trim(),
      tags: c.tags || [],
      history: c.history || [],
      custom: { ...(c.custom || {}) },
    };
    state.settings.customFields.forEach(f => { data.custom[f.key] = document.getElementById("ct_custom_" + f.key).value; });
    const newHist = document.getElementById("ct_newHist").value.trim();
    if (newHist) data.history.unshift({ text: newHist, at: Date.now(), by: state.currentUser?.nom || "?" });
    if (!data.nom) { toast("Le nom est requis", "error"); setLoading(btn, false); return; }
    if (isNew) { data.createdAt = Date.now(); if (state.settings.autoAssign && !data.assignedTo) data.assignedTo = autoAssignNext(); }
    try {
      const cid = id || ("c" + Date.now());
      const oldStatut = !isNew ? c.statut : null;
      const oldAssigned = !isNew ? c.assignedTo : null;
      await saveDoc("contacts", cid, data);
      await logActivity(isNew ? "Création contact" : "Modification contact", data.nom);
      if (isNew) await pushToSheets({ id: cid, ...data });

      // Notifications in-site
      if (isNew) {
        if (data.assignedTo && data.assignedTo !== state.currentUser?.id) {
          await addNotification({ title: "Nouveau lead assigné", msg: `${data.nom} vous a été attribué`, type: "info", userId: data.assignedTo });
        }
      } else {
        if (oldStatut !== data.statut) {
          const label = state.settings.statuses.find(s => s.key === data.statut)?.label || data.statut;
          await addNotification({ title: "Changement de statut", msg: `${data.nom} → ${label}`, type: data.statut === "traite" ? "success" : "info" });
        }
        if (oldAssigned !== data.assignedTo && data.assignedTo && data.assignedTo !== state.currentUser?.id) {
          await addNotification({ title: "Lead réassigné", msg: `${data.nom} vous a été attribué`, type: "info", userId: data.assignedTo });
        }
      }

      toast(isNew ? "Contact créé" : "Contact modifié", "success");
      if (!FIREBASE_READY) renderContacts();
      closeModal();

function confirmDeleteContact(id) {

function exportContactsCSV(list) {
  const headers = ["Nom","Email","Téléphone","Ville","Statut","Assigné","Notes","Créé le"];
  const rows = list.map(c => {
    const a = state.staff.find(s => s.id === c.assignedTo);
    return [c.nom, c.email, c.tel, c.ville, statusByKey(c.statut).label, a?.nom || "", (c.notes || "").replace(/\n/g, " "), c.createdAt ? new Date(c.createdAt).toLocaleDateString("fr-FR") : ""];
  });
  const csv = [headers, ...rows].map(r => r.map(v => `"${(v || "").toString().replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `contacts-${new Date().toISOString().slice(0,10)}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast("Export CSV téléchargé", "success");
}

function renderCalendar() {
  if (state.view !== "calendar") return;
  const year = state.calYear;
  const month = state.calMonth;
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const startDay = (first.getDay() + 6) % 7; // lundi = 0
  const totalDays = last.getDate();
  const monthName = first.toLocaleDateString("fr-FR", { month: "long", year: "numeric" });
  const today = new Date();
  const isThisMonth = year === today.getFullYear() && month === today.getMonth();

  // Events for this month
  const monthEvents = (state.events || []).filter(e => {
    const d = new Date(e.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });
  const eventsByDay = {};
  monthEvents.forEach(e => {
    const day = new Date(e.date).getDate();
    (eventsByDay[day] = eventsByDay[day] || []).push(e);
  });

  const days = [];
  for (let i = 0; i < startDay; i++) days.push(`<div class="cal-day empty"></div>`);
  for (let d = 1; d <= totalDays; d++) {
    const isToday = isThisMonth && d === today.getDate();
    const has = eventsByDay[d];
    days.push(`<div class="cal-day ${isToday ? "today" : ""} ${has ? "has-event" : ""}" data-day="${d}">${d}${has ? '<div class="dot"></div>' : ''}</div>`);
  }

  const dayNames = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  const upcoming = (state.events || [])
    .filter(e => e.date >= Date.now() - 86400000)
    .sort((a, b) => a.date - b.date)
    .slice(0, 20);

  document.getElementById("dashMain").innerHTML = `
    <div class="dash-header">
      <div><div class="dash-title">Calendrier</div><div class="dash-subtitle">Gère tes rendez-vous et rappels · Fuseau : ${Intl.DateTimeFormat().resolvedOptions().timeZone}</div></div>
      <div class="dash-actions"><button class="btn btn-sm" id="newEvent">+ Nouveau RDV</button></div>
    </div>
    <div class="calendar-wrap">
      <div class="cal-header">
        <h3>${monthName}</h3>
        <div class="cal-nav">
          <button id="calPrev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button id="calToday" style="width:auto;padding:0 12px;font-size:11px;">Aujourd'hui</button>
          <button id="calNext"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
      </div>
      <div class="cal-grid">
        ${dayNames.map(n => `<div class="cal-day-name">${n}</div>`).join("")}
        ${days.join("")}
      </div>
      <div class="event-list">
        <h3 style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-soft);margin:18px 0 10px;font-weight:700;">Prochains rendez-vous</h3>
        ${upcoming.length ? upcoming.map(e => {
          const d = new Date(e.date);
          return `<div class="event-item" data-event-id="${e.id}">
            <div class="event-time"><div>${d.toLocaleDateString("fr-FR", { day:"2-digit", month:"short" })}</div><div class="h">${d.toLocaleTimeString("fr-FR", { hour:"2-digit", minute:"2-digit" })}</div></div>
            <div><div class="event-title">${e.title}</div><div class="event-desc">${e.desc || ""}</div></div>
            <button class="icon-btn" data-del-event="${e.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
          </div>`;
        }).join("") : '<div class="empty-state">Aucun rendez-vous planifié</div>'}
      </div>
    </div>
  `;

  document.getElementById("calPrev").addEventListener("click", () => {
    state.calMonth--; if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; } renderCalendar();
  });
  document.getElementById("calNext").addEventListener("click", () => {
    state.calMonth++; if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; } renderCalendar();
  });
  document.getElementById("calToday").addEventListener("click", () => {
    state.calMonth = new Date().getMonth(); state.calYear = new Date().getFullYear(); renderCalendar();
  });
  document.getElementById("newEvent").addEventListener("click", () => openEventModal(null));
  document.querySelectorAll(".cal-day[data-day]").forEach(d => d.addEventListener("click", () => {
    const day = parseInt(d.dataset.day);
    const date = new Date(year, month, day, 9, 0);
    openEventModal(null, date.getTime());
  }));
  document.querySelectorAll("[data-event-id]").forEach(el => el.addEventListener("click", e => {
    if (e.target.closest("[data-del-event]")) return;
    openEventModal(el.dataset.eventId);
  }));
  document.querySelectorAll("[data-del-event]").forEach(b => b.addEventListener("click", async ev => {
    ev.stopPropagation();
    const id = b.dataset.delEvent;
    state.events = state.events.filter(e => e.id !== id);
    if (!FIREBASE_READY) { localStorage.setItem("crm_events", JSON.stringify(state.events)); }
    else { try { await deleteDocById("events", id); } catch {} }
    toast("Rendez-vous supprimé", "success");
    renderCalendar();
  }));
}

function openEventModal(id, defaultDate) {
  const ev = id ? (state.events || []).find(e => e.id === id) : null;
  const d = new Date(ev?.date || defaultDate || Date.now());
  // Format en heure LOCALE du navigateur (pas UTC) pour affichage correct quel que soit le fuseau
  const pad = n => String(n).padStart(2, "0");
  const dateStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const timeStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;

  openModal(`
    <h2>${ev ? "Modifier RDV" : "Nouveau rendez-vous"}</h2>
    <div class="modal-form">
      <label>Titre</label><input id="ev_title" value="${ev?.title || ''}" placeholder="Ex: Appel client Dupont"/>
      <div class="modal-form-row">
        <div><label>Date</label><input id="ev_date" type="date" value="${dateStr}"/></div>
        <div><label>Heure</label><input id="ev_time" type="time" value="${timeStr}"/></div>
      </div>
      <label>Description</label><textarea id="ev_desc">${ev?.desc || ''}</textarea>
      <label>Rappel avant l'événement</label>
      <select id="ev_reminder">
        <option value="0" ${(ev?.reminder || 0) === 0 ? "selected" : ""}>Aucun</option>
        <option value="15" ${ev?.reminder === 15 ? "selected" : ""}>15 minutes</option>
        <option value="30" ${ev?.reminder === 30 ? "selected" : ""}>30 minutes</option>
        <option value="60" ${(ev?.reminder === 60 || !ev) ? "selected" : ""}>1 heure</option>
        <option value="1440" ${ev?.reminder === 1440 ? "selected" : ""}>1 jour</option>
      </select>
    </div>
    <div class="modal-actions">
      ${ev ? '<button class="btn btn-danger" id="delEv">Supprimer</button>' : ''}
      <button class="btn btn-ghost" id="cancelEv">Annuler</button>
      <button class="btn" id="saveEv">Enregistrer</button>
    </div>
  `);
  document.getElementById("cancelEv").addEventListener("click", closeModal);
  document.getElementById("delEv")?.addEventListener("click", async () => {
    state.events = state.events.filter(e => e.id !== id);
    if (!FIREBASE_READY) localStorage.setItem("crm_events", JSON.stringify(state.events));
    else { try { await deleteDocById("events", id); } catch {} }
    toast("Supprimé", "success");
    closeModal();
    renderCalendar();
  });
  document.getElementById("saveEv").addEventListener("click", async () => {
    const btn = document.getElementById("saveEv");
    setLoading(btn, true);
    const title = document.getElementById("ev_title").value.trim();
    if (!title) { toast("Titre requis", "error"); setLoading(btn, false); return; }
    const [y, m, dd] = document.getElementById("ev_date").value.split("-");
    const [hh, mm] = document.getElementById("ev_time").value.split(":");
    const date = new Date(+y, +m - 1, +dd, +hh, +mm).getTime();
    const data = {
      id: id || ("ev" + Date.now()),
      title,
      desc: document.getElementById("ev_desc").value.trim(),
      date,
      reminder: parseInt(document.getElementById("ev_reminder").value) || 0,
      user: state.currentUser?.id || "",
      createdAt: ev?.createdAt || Date.now(),
    };
    try {
      if (FIREBASE_READY) await saveDoc("events", data.id, data);
      else {
        state.events = state.events || [];
        const idx = state.events.findIndex(e => e.id === data.id);
        if (idx >= 0) state.events[idx] = data;
        else state.events.push(data);
        localStorage.setItem("crm_events", JSON.stringify(state.events));
      }
      await logActivity(id ? "Modification RDV" : "Création RDV", title);
      toast(id ? "Modifié" : "Créé", "success");
      closeModal();
      renderCalendar();
    } catch { toast("Erreur", "error"); }
    finally { setLoading(btn, false); }
  });
}

// Check event reminders every minute
setInterval(() => {
  if (!state.currentUser) return;
  const now = Date.now();
  (state.events || []).forEach(e => {
    if (e.reminded || !e.reminder) return;
    const alertTime = e.date - e.reminder * 60000;
    if (now >= alertTime && now < e.date) {
      e.reminded = true;
      if (!FIREBASE_READY) localStorage.setItem("crm_events", JSON.stringify(state.events));
      pushNotification("📅 Rendez-vous à venir", `${e.title} dans ${e.reminder} min`);
      toast(`Rappel : ${e.title}`, "info");
    }
  });
}, 60000);
